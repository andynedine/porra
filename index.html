<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>elporrazo.es — Próximamente</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: #000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Portrait / móvil vertical: centrado con contain */
        .promo-img {
            display: block;
            width: 100%;
            max-width: 100vw;
            height: auto;
            max-height: 100vh;
            max-height: 100dvh;
            object-fit: contain;
        }

        /* Landscape: expande a ancho completo sin límite de altura */
        @media (orientation: landscape) {
            body {
                align-items: flex-start;
            }
            .promo-img {
                width: 100%;
                max-width: none;
                height: auto;
                max-height: none;
                object-fit: fill;
            }
        }
    </style>
</head>
<body>
    <img
        class="promo-img"
        src="proximamente.png"
        alt="elporrazo.es — Próximamente"
        loading="eager"
    >
</body>
</html>
