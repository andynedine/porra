<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Porra Mundial 2026 — Tu dashboard de predicciones" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Dashboard — Porra Mundial 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css" />
  <!-- Chart.js UMD — available as window.Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>
</head>
<body data-page="dashboard" class="dashboard-layout">

  <!-- ===== HEADER ===== -->
  <header class="app-header" role="banner">
    <span class="app-header__logo">
        <img src="images/logo.png" alt="" class="app-header__logo-img" aria-hidden="true">Porra 2026
      </span>
    <div class="app-header__spacer"></div>
    <div class="app-header__links">
      <a id="admin-link" class="btn btn--xs btn--gold hidden" href="admin.html">👑 Admin</a>
    </div>
    <div class="app-header__user">
      <button class="user-profile-btn" id="user-profile-btn" aria-label="Mi perfil">
        <svg class="user-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="user-name" class="user-name"></span>
      </button>
      <button id="logout-btn" class="btn btn--xs btn--outline" aria-label="Cerrar sesión">Salir</button>
    </div>
  </header>

  <!-- ===== NAVIGATION TABS ===== -->
  <nav class="dash-nav" role="tablist" aria-label="Secciones del dashboard">
    <button class="dash-tab" role="tab" data-tab="partidos"
      aria-selected="false" aria-controls="panel-partidos">
      📅 Partidos
    </button>
    <button class="dash-tab" role="tab" data-tab="predicciones"
      aria-selected="false" aria-controls="panel-predicciones">
      ✍️ Predicciones
    </button>
    <button class="dash-tab" role="tab" data-tab="clasificacion"
      aria-selected="false" aria-controls="panel-clasificacion">
      🏆 Clasificación
    </button>
    <button class="dash-tab" role="tab" data-tab="estadisticas"
      aria-selected="false" aria-controls="panel-estadisticas">
      📊 Estadísticas
    </button>
    <button class="dash-tab" role="tab" data-tab="perfil"
      aria-selected="false" aria-controls="panel-perfil"
      hidden></button>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="dashboard-main" role="main">

    <!-- PARTIDOS -->
    <section id="panel-partidos" class="dash-panel hidden" role="tabpanel" aria-labelledby="tab-partidos">
      <div class="loading"><span class="spinner"></span></div>
    </section>

    <!-- PREDICCIONES -->
    <section id="panel-predicciones" class="dash-panel hidden" role="tabpanel" aria-labelledby="tab-predicciones">
      <div id="predictions-section">
        <div class="loading"><span class="spinner"></span></div>
      </div>
    </section>

    <!-- CLASIFICACIÓN -->
    <section id="panel-clasificacion" class="dash-panel hidden" role="tabpanel" aria-labelledby="tab-clasificacion">
      <div id="ranking-section">
        <div class="loading"><span class="spinner"></span></div>
      </div>
    </section>

    <!-- ESTADÍSTICAS -->
    <section id="panel-estadisticas" class="dash-panel hidden" role="tabpanel" aria-labelledby="tab-estadisticas">
      <div id="stats-section">
        <div class="loading"><span class="spinner"></span></div>
      </div>
    </section>

    <!-- PERFIL -->
    <section id="panel-perfil" class="dash-panel hidden" role="tabpanel" aria-labelledby="tab-perfil">
      <div class="loading"><span class="spinner"></span></div>
    </section>

  </main>

  <!-- Toast container is created dynamically by utils.js -->

  <script type="module" src="js/app.js"></script>
</body>
</html>
